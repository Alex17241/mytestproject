{% extends "base.html" %}
{% block title %}Удаление — Instango{% endblock %}

{% block content %}
<div class="container">
    <div class="confirm-card">
        <div class="confirm-icon"><i class="fa-regular fa-trash-can"></i></div>
        <h1 class="confirm-title">Удалить публикацию?</h1>
        <p class="confirm-text">
            Вы уверены, что хотите удалить<br>
            <strong>«{{ object.title }}»</strong>?<br>
            <span style="color:#ef4444;">Это действие необратимо.</span>
        </p>
        <div class="confirm-actions">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">
                    <i class="fa-solid fa-trash"></i> Да, удалить
                </button>
            </form>
            <a href="{% url 'mainapp:post_detail' pk=object.pk %}" class="btn btn-outline btn-lg">
                <i class="fa-solid fa-xmark"></i> Отмена
            </a>
        </div>
    </div>
</div>
{% endblock %}
