<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SERVER // ONLINE</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <div class="terminal-wrapper">
    <div class="bg-grid"></div>

    <div class="terminal-box">
      <div class="terminal-header">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span>TERMINAL v2.4.1 &nbsp;|&nbsp; ROOT@SERVER &nbsp;|&nbsp; /home/welcome</span>
      </div>

      <h1 data-text="Welcome to my server">Welcome to my server</h1>

      <div class="status-line">
        > SYSTEM ONLINE &nbsp;<span class="cursor"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        UPTIME
        <span>99.97%</span>
      </div>
      <div class="stat-item">
        STATUS
        <span>ACTIVE</span>
      </div>
      <div class="stat-item">
        PING
        <span>12ms</span>
      </div>
      <div class="stat-item">
        PLAYERS
        <span>0 / 64</span>
      </div>
    </div>
  </div>

</body>
</html>
