{% load static %}
<nav class="navbar">
    <div class="navbar-inner">


        <a href="{% url 'mainapp:home' %}" class="navbar-brand">Instango</a>
        <div class="navbar-search">
            <form action="{% url 'mainapp:all_posts' %}" method="get">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="search" name="q"
                       value="{{ request.GET.q|default:'' }}"
                       placeholder="Поиск публикаций...">
            </form>
        </div>
        <div class="navbar-actions">

            <a href="{% url 'mainapp:all_posts' %}"
               class="nav-icon-btn {% if request.resolver_match.url_name == 'all_posts' %}active{% endif %}"
               title="Все публикации">
                <i class="fa-solid fa-compass"></i>
            </a>

            {% if user.is_authenticated %}

                <a href="{% url 'mainapp:post_create' %}" class="nav-icon-btn" title="Создать публикацию">
                    <i class="fa-regular fa-square-plus"></i>
                </a>

                <div class="nav-dropdown">
                    <button class="nav-icon-btn">
                        {% if user.profile.avatar %}
                            <img src="{{ user.profile.avatar.url }}"
                                 alt="{{ user.username }}" class="nav-user-avatar">
                        {% else %}
                            <span class="nav-avatar-placeholder">
                                {{ user.username|first|upper }}
                            </span>
                        {% endif %}
                    </button>

                    <div class="nav-dropdown-menu">
                        <a href="{% url 'mainapp:profile' username=user.username %}"
                           class="nav-dropdown-item">
                            <i class="fa-regular fa-user"></i> Мой профиль
                        </a>
                        <a href="{% url 'mainapp:post_create' %}" class="nav-dropdown-item">
                            <i class="fa-regular fa-square-plus"></i> Новая публикация
                        </a>
                        <a href="{% url 'mainapp:profile_edit' %}" class="nav-dropdown-item">
                            <i class="fa-solid fa-gear"></i> Настройки
                        </a>
                        <div class="nav-dropdown-divider"></div>
                        <form method="post" action="{% url 'mainapp:logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="nav-dropdown-item"
                                    style="width:100%;border:none;background:none;
                                           cursor:pointer;text-align:left;font-family:inherit;">
                                <i class="fa-solid fa-right-from-bracket"></i> Выйти
                            </button>
                        </form>
                    </div>
                </div>

            {% else %}

                <a href="{% url 'mainapp:login' %}" class="btn btn-outline btn-sm">Войти</a>
                <a href="{% url 'mainapp:register' %}" class="btn btn-primary btn-sm">Регистрация</a>

            {% endif %}
        </div>
        <button class="navbar-toggle" aria-label="Меню">
            <span></span><span></span><span></span>
        </button>

    </div>

    <div class="mobile-menu" id="mobile-menu">
        <div style="padding:1rem;border-top:1px solid var(--border)">
            <form action="{% url 'mainapp:all_posts' %}" method="get" style="margin-bottom:1rem;">
                <div class="search-bar-big" style="margin:0">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="search" name="q" placeholder="Поиск...">
                </div>
            </form>

            <a href="{% url 'mainapp:all_posts' %}"
               style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;color:var(--text-primary);">
                <i class="fa-solid fa-compass" style="width:18px;text-align:center;"></i>
                Публикации
            </a>

            {% if user.is_authenticated %}
            <a href="{% url 'mainapp:post_create' %}"
               style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;color:var(--text-primary);">
                <i class="fa-regular fa-square-plus" style="width:18px;text-align:center;"></i>
                Создать
            </a>
            <a href="{% url 'mainapp:profile' username=user.username %}"
               style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;color:var(--text-primary);">
                <i class="fa-regular fa-user" style="width:18px;text-align:center;"></i>
                Профиль
            </a>
            {% else %}
            <a href="{% url 'mainapp:login' %}"
               style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;color:var(--text-primary);">
                <i class="fa-solid fa-right-to-bracket" style="width:18px;text-align:center;"></i>
                Войти
            </a>
            {% endif %}
        </div>
    </div>
</nav>

<style>
.mobile-menu { display: none; }
.mobile-menu.open { display: block; background: var(--bg-card); }
</style>
